kind = "web"
previewPath = "/"
title = "Travel Agency Dashboard"
version = "1.0.0"
id = "artifacts/travel-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19981

[services.development]
run = "pnpm --filter @workspace/travel-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-agency", "run", "build" ]
run = "node artifacts/travel-agency/.next/standalone/server.js"

[services.env]
PORT = "19981"
HOSTNAME = "0.0.0.0"
